<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion v3.1</title>
<style>
html,body{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;background:#06080e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;user-select:none;}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

#topbar{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(6,8,14,0.96);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;padding:0 28px;gap:20px;z-index:200;backdrop-filter:blur(10px);}
.tb-title{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.85);}
.tb-ver{font-size:10px;color:rgba(255,255,255,0.2);margin-left:-12px;}
.tb-div{width:1px;height:16px;background:rgba(255,255,255,0.07);}
.tb-stats{display:flex;gap:22px;}
.tb-stat{display:flex;align-items:baseline;gap:5px;font-size:11px;color:rgba(255,255,255,0.3);}
.tb-num{font-size:14px;font-weight:600;color:rgba(255,255,255,0.75);}
.tb-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.tb-btn{font-size:11px;background:none;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:5px 14px;cursor:pointer;color:rgba(255,255,255,0.35);letter-spacing:.04em;transition:all .15s;}
.tb-btn:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.65);}
.tb-btn.save{border-color:rgba(29,158,117,0.3);color:rgba(29,158,117,0.65);}
.tb-btn.save:hover{border-color:rgba(29,158,117,0.6);color:#2dd4a0;}
.tb-btn.saving{border-color:rgba(239,159,39,0.4);color:rgba(239,159,39,0.7);pointer-events:none;}
.tb-btn.saved{border-color:rgba(29,158,117,0.5);color:#2dd4a0;pointer-events:none;}
.tb-date{font-size:11px;color:rgba(255,255,255,0.2);}

#tree{position:fixed;top:50px;left:0;right:0;bottom:0;z-index:1;}
#tree-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#node-layer{position:absolute;top:0;left:0;width:100%;height:100%;}

.nd{position:absolute;transform:translate(-50%,-50%);cursor:pointer;}

.nd-root{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 38% 35%,rgba(255,255,255,.1),rgba(255,255,255,.02));border:1.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px rgba(255,255,255,.04);}

/* ── Nó de projeto ─────────────────────────────────── */
.nd-proj{width:74px;height:74px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:2px solid;transition:filter .2s,transform .2s;}
.nd-proj:hover{filter:brightness(1.25);}
.nd-proj.sel{transform:translate(-50%,-50%) scale(1.08);}
.nd-proj .pe{font-size:22px;line-height:1;}
.nd-proj .pp{font-size:9px;font-weight:700;opacity:.9;}
/* Label principal do projeto */
.nd-proj .nd-lbl{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:rgba(255,255,255,.55);pointer-events:none;max-width:130px;overflow:hidden;text-overflow:ellipsis;}
/* Sublabel: fase ativa atual */
.nd-proj .nd-sublbl{position:absolute;bottom:-33px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;color:rgba(249,115,22,.75);pointer-events:none;max-width:130px;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;}

/* ── Nó de fase — aumentado de 44 → 60px ──────────── */
.nd-phase{width:60px;height:60px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1.5px solid;transition:filter .15s;}
.nd-phase:hover{filter:brightness(1.35);}
.nd-phase .ph-n{font-size:10px;font-weight:700;opacity:.55;line-height:1;}
.nd-phase .ph-ico{font-size:14px;line-height:1;}
.nd-phase .ph-tasks{font-size:9px;opacity:.45;line-height:1;margin-top:1px;}
.nd-phase .nd-lbl{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;pointer-events:none;max-width:100px;overflow:hidden;text-overflow:ellipsis;text-align:center;}

/* ── Hold ring ─────────────────────────────────────── */
.hold-ring{position:absolute;inset:-8px;border-radius:50%;pointer-events:none;z-index:3;background:conic-gradient(rgba(255,255,255,0) 0%,rgba(255,255,255,0) 100%);-webkit-mask:radial-gradient(farthest-side,transparent 61%,black 62%);mask:radial-gradient(farthest-side,transparent 61%,black 62%);}

/* ── Progress ring estático (itens concluídos) ──────── */
.ph-prog-ring{position:absolute;inset:-8px;border-radius:50%;pointer-events:none;z-index:2;-webkit-mask:radial-gradient(farthest-side,transparent 61%,black 62%);mask:radial-gradient(farthest-side,transparent 61%,black 62%);opacity:.45;transition:background .4s;}

/* ── Estados de fase ──────────────────────────────── */
.ph-done   {border-color:rgba(34,197,94,.75);background:radial-gradient(circle at 38% 35%,rgba(34,197,94,.22),rgba(34,197,94,.05));box-shadow:0 0 16px rgba(34,197,94,.28);}
.ph-done .nd-lbl{color:rgba(34,197,94,.75);}
.ph-active {border-color:rgba(249,115,22,.85);background:radial-gradient(circle at 38% 35%,rgba(249,115,22,.28),rgba(249,115,22,.08));box-shadow:0 0 22px rgba(249,115,22,.45);width:68px;height:68px;}
.ph-active .nd-lbl{color:rgba(249,115,22,.9);}
.ph-planned{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.06);opacity:.6;}
.ph-planned .nd-lbl{color:rgba(59,130,246,.65);}
.ph-vision {border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.04);opacity:.38;}
.ph-vision .nd-lbl{color:rgba(139,92,246,.6);}

/* ── Estados de projeto ─────────────────────────────── */
.s-andamento{border-color:#1D9E75;background:radial-gradient(circle at 38% 35%,rgba(29,158,117,.25),rgba(29,158,117,.06));color:#1D9E75;box-shadow:0 0 24px rgba(29,158,117,.2);}
.s-atencao  {border-color:#EF9F27;background:radial-gradient(circle at 38% 35%,rgba(239,159,39,.25),rgba(239,159,39,.06));color:#EF9F27;box-shadow:0 0 24px rgba(239,159,39,.2);}
.s-plan     {border-color:#378ADD;background:radial-gradient(circle at 38% 35%,rgba(55,138,221,.25),rgba(55,138,221,.06));color:#378ADD;box-shadow:0 0 24px rgba(55,138,221,.2);}
.s-bloq     {border-color:#E24B4A;background:radial-gradient(circle at 38% 35%,rgba(226,75,74,.25),rgba(226,75,74,.06));color:#E24B4A;box-shadow:0 0 24px rgba(226,75,74,.2);}
.s-paus     {border-color:#888;background:radial-gradient(circle at 38% 35%,rgba(136,136,136,.2),rgba(136,136,136,.04));color:#888;}

/* ── Painel lateral ─────────────────────────────────── */
#panel{position:fixed;top:50px;right:-440px;bottom:0;width:420px;background:rgba(6,8,14,.98);border-left:1px solid rgba(255,255,255,.06);transition:right .35s cubic-bezier(.4,0,.2,1);z-index:150;display:flex;flex-direction:column;backdrop-filter:blur(14px);}
#panel.open{right:0;}
#ph{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:10px;flex-shrink:0;}
#ph-back{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.28);font-size:20px;line-height:1;padding:0;}
#ph-back:hover{color:rgba(255,255,255,.8);}
#ph-emoji{font-size:22px;}
.ph-info{flex:1;min-width:0;}
#ph-name{font-size:14px;font-weight:600;color:rgba(255,255,255,.9);}
#ph-desc{font-size:11px;color:rgba(255,255,255,.32);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#ph-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;flex-shrink:0;}
#pb{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px;}
#pb::-webkit-scrollbar{width:3px;}
#pb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}

.ps-h{font-size:13px;font-weight:700;letter-spacing:.02em;color:rgba(255,255,255,.8);margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.07);}
.ps-c{margin-left:auto;font-size:11px;font-weight:400;color:rgba(255,255,255,.3);}

.p-overview{display:flex;gap:5px;align-items:center;}
.p-pip{flex:1;height:5px;border-radius:99px;}
.p-pip.done   {background:#22C55E;}
.p-pip.active {background:#F97316;}
.p-pip.planned{background:rgba(59,130,246,.4);}
.p-pip.vision {background:rgba(139,92,246,.25);}
.p-prog-txt{font-size:11px;color:rgba(255,255,255,.28);white-space:nowrap;margin-left:4px;}

.phase-row{border-radius:10px;border:1px solid;padding:12px 14px;transition:border-color .15s;}
.phase-row.done   {border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04);}
.phase-row.active {border-color:rgba(249,115,22,.35);background:rgba(249,115,22,.06);}
.phase-row.planned{border-color:rgba(59,130,246,.12);background:rgba(59,130,246,.02);opacity:.75;}
.phase-row.vision {border-color:rgba(139,92,246,.1);background:rgba(139,92,246,.02);opacity:.5;}
.phase-row-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ph-row-num{font-size:10px;font-weight:700;opacity:.45;min-width:20px;}
.ph-row-name{font-size:13px;font-weight:600;flex:1;}
.ph-row-cnt{font-size:10px;color:rgba(255,255,255,.22);}

.ph-row-adv{position:relative;overflow:hidden;font-size:10px;background:none;border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 10px;cursor:pointer;color:rgba(255,255,255,.45);transition:color .15s,border-color .15s;flex-shrink:0;}
.ph-row-adv:hover{border-color:rgba(255,255,255,.28);color:rgba(255,255,255,.8);}
.ph-row-adv-fill{position:absolute;top:0;left:0;height:100%;width:0%;background:rgba(255,255,255,.15);pointer-events:none;border-radius:4px;}

.ph-row-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.04em;flex-shrink:0;}
.done   .ph-row-badge{background:rgba(34,197,94,.15);color:#4ade80;}
.active .ph-row-badge{background:rgba(249,115,22,.15);color:#fb923c;}
.planned .ph-row-badge{background:rgba(59,130,246,.12);color:#60a5fa;}
.vision  .ph-row-badge{background:rgba(139,92,246,.12);color:#a78bfa;}

.phase-items{display:flex;flex-direction:column;gap:5px;}
.ph-item-row{display:flex;align-items:flex-start;gap:8px;padding:4px 2px;border-radius:5px;}
.ph-item-row:hover{background:rgba(255,255,255,.04);}
.ph-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid rgba(255,255,255,.18);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;margin-top:2px;transition:all .15s;}
.ph-chk.ck{background:#1D9E75;border-color:#1D9E75;}
.ph-item-txt{flex:1;font-size:11px;color:rgba(255,255,255,.55);line-height:1.5;outline:none;border-radius:3px;padding:0 2px;}
.ph-item-txt:focus{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9);}
.ph-item-row.idone .ph-item-txt{text-decoration:line-through;color:rgba(255,255,255,.22);}
.ph-item-del{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.15);font-size:12px;padding:0;opacity:0;flex-shrink:0;line-height:1;margin-top:3px;}
.ph-item-row:hover .ph-item-del{opacity:1;}

.ph-add-row{display:flex;gap:6px;margin-top:8px;}
.ph-add-inp{flex:1;font-size:11px;padding:5px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:6px;color:rgba(255,255,255,.7);outline:none;}
.ph-add-inp:focus{border-color:rgba(255,255,255,.18);}
.ph-add-btn{font-size:10px;background:none;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:0 9px;cursor:pointer;color:rgba(255,255,255,.3);white-space:nowrap;height:28px;}
.ph-add-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.65);}

.eg{display:flex;flex-direction:column;gap:7px;}
.er{display:flex;align-items:center;gap:9px;}
.el{font-size:11px;color:rgba(255,255,255,.25);min-width:58px;flex-shrink:0;}
.er input[type=text],.er select{flex:1;font-size:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:6px 9px;color:rgba(255,255,255,.75);outline:none;}
.er input[type=text]:focus,.er select:focus{border-color:rgba(255,255,255,.18);}
.er input[type=range]{flex:1;}
.eo{font-size:11px;color:rgba(255,255,255,.28);min-width:22px;}
.db{font-size:11px;background:none;border:1px solid rgba(226,75,74,.28);color:rgba(226,75,74,.6);border-radius:6px;padding:5px 10px;cursor:pointer;margin-top:3px;align-self:flex-start;}
.db:hover{color:#E24B4A;border-color:rgba(226,75,74,.55);}

.bg-g{background:rgba(29,158,117,.15);color:#2dd4a0;}
.bg-a{background:rgba(239,159,39,.15);color:#f5b942;}
.bg-b{background:rgba(55,138,221,.15);color:#60a8f0;}
.bg-r{background:rgba(226,75,74,.15);color:#f07070;}
.bg-z{background:rgba(136,136,136,.15);color:#aaa;}

#tt{position:fixed;background:rgba(6,8,14,.97);border:1px solid rgba(255,255,255,.09);border-radius:7px;padding:8px 12px;font-size:11px;color:rgba(255,255,255,.6);pointer-events:none;z-index:400;display:none;max-width:240px;line-height:1.5;}
#tt .tt-title{font-weight:600;color:rgba(255,255,255,.85);margin-bottom:4px;font-size:12px;}
#tt .tt-hint{font-size:10px;color:rgba(255,255,255,.3);margin-top:5px;border-top:1px solid rgba(255,255,255,.07);padding-top:5px;}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="topbar">
  <span class="tb-title">🌌 Orion</span>
  <span class="tb-ver">v3.3</span>
  <div class="tb-div"></div>
  <div class="tb-stats">
    <div class="tb-stat"><span class="tb-num" id="s-total">0</span>projetos</div>
    <div class="tb-stat"><span class="tb-num" id="s-phases">0</span>fases concluídas</div>
    <div class="tb-stat"><span class="tb-num" id="s-active">0</span>em andamento</div>
  </div>
  <div class="tb-actions">
    <button class="tb-btn save" id="save-btn" onclick="manualSave()">💾 salvar</button>
    <button class="tb-btn" onclick="addP()">＋ projeto</button>
    <span class="tb-date" id="today-date"></span>
  </div>
</div>

<div id="tree">
  <svg id="tree-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="node-layer"></div>
</div>

<div id="panel">
  <div id="ph">
    <button id="ph-back" onclick="closePanel()">←</button>
    <span id="ph-emoji"></span>
    <div class="ph-info"><div id="ph-name"></div><div id="ph-desc"></div></div>
    <span id="ph-badge"></span>
  </div>
  <div id="pb"></div>
</div>

<div id="tt"></div>

<script>

let activeId=null;

const donePhases=p=>p.phases.filter(x=>x.status==='done').length;
const pct=p=>p.phases.length?Math.round(donePhases(p)/p.phases.length*100):0;

// ── Hold-to-confirm ───────────────────────────────────
const HOLD_MS=3000;
let holdState=null;

function startHoldNode(e,el,onConfirm){
  e.stopPropagation();
  if(holdState)clearHold();
  const ring=el.querySelector('.hold-ring');
  if(!ring)return;
  let p=0;
  const step=100/(HOLD_MS/16);
  holdState=setInterval(()=>{
    p=Math.min(p+step,100);
    ring.style.background=`conic-gradient(rgba(255,255,255,.8) ${p}%, transparent ${p}%)`;
    if(p>=100){clearHold();onConfirm();}
  },16);
}

function startHoldBtn(e,btn,onConfirm){
  e.stopPropagation();e.preventDefault();
  if(holdState)clearHold();
  const fill=btn.querySelector('.ph-row-adv-fill');
  if(!fill)return;
  let p=0;
  const step=100/(HOLD_MS/16);
  holdState=setInterval(()=>{
    p=Math.min(p+step,100);
    fill.style.width=p+'%';
    if(p>=100){fill.style.width='0%';clearHold();onConfirm();}
  },16);
}

function clearHold(){
  if(!holdState)return;
  clearInterval(holdState);
  holdState=null;
  document.querySelectorAll('.hold-ring').forEach(r=>r.style.background='');
  document.querySelectorAll('.ph-row-adv-fill').forEach(f=>f.style.width='0%');
}

// ── Layout ────────────────────────────────────────────
// Raio usado para calcular pontos de conexão das linhas
const R_PROJ=37, R_PHASE=30;

function layout(){
  const W=window.innerWidth,H=window.innerHeight-50;
  const panW=activeId?420:0,tW=W-panW;
  const n=ps.length,pad=H*0.12;
  const root={x:60,y:H/2};
  const projs=ps.map((p,i)=>({
    id:p.id,x:200,y:n>1?pad+(H-pad*2)*i/(n-1):H/2,
    status:p.status,emoji:p.emoji,name:p.name,pct:pct(p),
  }));
  const phases=[];
  ps.forEach((p,pi)=>{
    const proj=projs[pi];
    // espaçamento mínimo maior para acomodar nós de 60px
    const spacing=Math.min(150,(tW-proj.x-100)/Math.max(p.phases.length,1));
    p.phases.forEach((ph,phi)=>{
      phases.push({key:`${p.id}-${ph.id}`,pid:p.id,phid:ph.id,
        x:proj.x+130+phi*spacing,y:proj.y,
        status:ph.status,name:ph.name,num:ph.num,items:ph.items});
    });
  });
  return{root,projs,phases};
}

// ── Render ────────────────────────────────────────────
function render(){
  const l=layout();
  renderSVG(l);renderNodes(l);renderStats();
}

function renderSVG({root,projs,phases}){
  const svg=document.getElementById('tree-svg');svg.innerHTML='';
  function curve(x1,y1,x2,y2,stroke,op,w,dash=''){
    const dx=(x2-x1)*.45;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`);
    p.setAttribute('fill','none');p.setAttribute('stroke',stroke);
    p.setAttribute('stroke-width',w);p.setAttribute('stroke-opacity',op);
    if(dash)p.setAttribute('stroke-dasharray',dash);
    svg.appendChild(p);
  }
  const SC2={andamento:'#1D9E75',atencao:'#EF9F27',plan:'#378ADD',bloq:'#E24B4A',paus:'#888'};

  // Linhas root → projeto
  projs.forEach(pr=>{
    const c=SC2[ps.find(p=>p.id===pr.id).status]||'#fff';
    curve(root.x+26,root.y,pr.x-R_PROJ,pr.y,c,0.3,2);
  });

  // Linhas projeto → fases e fase → fase
  ps.forEach((p,pi)=>{
    const proj=projs[pi];
    const phs=phases.filter(x=>x.pid===p.id);
    phs.forEach((ph,i)=>{
      if(i===0){
        // proj → primeira fase
        curve(proj.x+R_PROJ,proj.y,ph.x-R_PHASE,proj.y,SC2[p.status]||'#fff',0.35,2);
      } else {
        const prev=phs[i-1];
        const c=PSC[ph.status];
        const op=ph.status==='done'?0.52:ph.status==='active'?0.42:ph.status==='planned'?0.2:0.1;
        const w=ph.status==='done'?2:ph.status==='active'?2:1.2;
        const dash=ph.status==='planned'?'4,3':ph.status==='vision'?'3,4':'';
        curve(prev.x+R_PHASE,prev.y,ph.x-R_PHASE,ph.y,c,op,w,dash);
      }
    });
  });
}

function renderNodes({root,projs,phases}){
  const layer=document.getElementById('node-layer');layer.innerHTML='';

  // Nó raiz
  const re=document.createElement('div');
  re.className='nd nd-root';re.style.cssText=`left:${root.x}px;top:${root.y}px;`;
  re.textContent='⬡';layer.appendChild(re);

  // Nós de projeto
  projs.forEach(pr=>{
    const p=ps.find(x=>x.id===pr.id),s=SM[pr.status];
    const activePhase=p.phases.find(x=>x.status==='active');
    const el=document.createElement('div');
    el.className=`nd nd-proj ${s.sc}${activeId===pr.id?' sel':''}`;
    el.style.cssText=`left:${pr.x}px;top:${pr.y}px;`;
    el.innerHTML=`
      <span class="pe">${pr.emoji}</span>
      <span class="pp">${pr.pct}%</span>
      <span class="nd-lbl">${pr.name}</span>
      ${activePhase?`<span class="nd-sublbl">◉ ${activePhase.name}</span>`:''}
    `;
    el.onclick=()=>openPanel(pr.id);
    el.onmouseenter=e=>showTT(e,pr.name,`${donePhases(p)}/${p.phases.length} fases concluídas · ${s.label}`);
    el.onmouseleave=hideTT;
    layer.appendChild(el);
  });

  // Nós de fase
  phases.forEach(ph=>{
    const el=document.createElement('div');
    el.className=`nd nd-phase ph-${ph.status}`;
    el.style.cssText=`left:${ph.x}px;top:${ph.y}px;`;

    const ico=ph.status==='done'?'✓':ph.status==='active'?'◉':ph.status==='planned'?'◌':'◈';
    const doneItems=ph.items.filter(x=>x.d).length;
    const totalItems=ph.items.length;
    const progPct=totalItems>0?Math.round(doneItems/totalItems*100):0;
    const progColor=PSC[ph.status];

    el.innerHTML=`
      <div class="hold-ring"></div>
      <div class="ph-prog-ring" style="background:conic-gradient(${progColor} ${progPct}%, transparent ${progPct}%)"></div>
      <span class="ph-n">${ph.num}</span>
      <span class="ph-ico">${ico}</span>
      <span class="ph-tasks">${doneItems}/${totalItems}</span>
      <span class="nd-lbl">${ph.name}</span>
    `;

    el.addEventListener('mousedown',e=>startHoldNode(e,el,()=>cyclePhase(ph.pid,ph.phid)));
    el.addEventListener('mouseup',clearHold);
    el.addEventListener('mouseleave',()=>{clearHold();hideTT();});
    el.addEventListener('touchstart',e=>startHoldNode(e,el,()=>cyclePhase(ph.pid,ph.phid)),{passive:false});
    el.addEventListener('touchend',clearHold);
    el.onmouseenter=e=>showTT(e,`${ph.name} · ${PSL[ph.status]}`,`${doneItems}/${totalItems} itens · segure para avançar`);

    layer.appendChild(el);
  });
}

function renderStats(){
  document.getElementById('s-total').textContent=ps.length;
  document.getElementById('s-phases').textContent=ps.reduce((a,p)=>a+donePhases(p),0);
  document.getElementById('s-active').textContent=ps.filter(p=>p.phases.some(x=>x.status==='active')).length;
}

// ── Cycle phase ───────────────────────────────────────
function cyclePhase(pid,phid){
  const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);
  const idx=CYCLE.indexOf(ph.status);
  ph.status=CYCLE[(idx+1)%CYCLE.length];
  render();
  if(activeId===pid)buildPanel(pid);
  autoSave();
}

// ── Item actions ──────────────────────────────────────
function toggleItem(pid,phid,idx){
  const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);
  ph.items[idx].d=!ph.items[idx].d;
  buildPanel(pid);render();autoSave();
}
function editItem(pid,phid,idx,val){
  const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);
  const v=val.trim();
  if(!v){ph.items.splice(idx,1);}else{ph.items[idx].t=v;}
  buildPanel(pid);autoSave();
}
function deleteItem(pid,phid,idx){
  const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);
  ph.items.splice(idx,1);
  buildPanel(pid);render();autoSave();
}
function addItem(pid,phid,inputId){
  const inp=document.getElementById(inputId),val=inp.value.trim();
  if(!val)return;
  const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);
  ph.items.push({t:val,d:false});
  inp.value='';buildPanel(pid);render();autoSave();
}

// ── Panel ─────────────────────────────────────────────
function openPanel(id){
  activeId=id;render();buildPanel(id);
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  activeId=null;render();
  document.getElementById('panel').classList.remove('open');
}

function buildPanel(id){
  const p=ps.find(x=>x.id===id),s=SM[p.status];
  document.getElementById('ph-emoji').textContent=p.emoji;
  document.getElementById('ph-name').textContent=p.name;
  document.getElementById('ph-desc').textContent=p.desc;
  const pb2=document.getElementById('ph-badge');pb2.className=s.b;pb2.textContent=s.label;
  const body=document.getElementById('pb');body.innerHTML='';

  // — 📈 Evolução —
  const pov=document.createElement('div');
  pov.innerHTML=`<div class="ps-h">📈 Evolução <span class="ps-c">${donePhases(p)}/${p.phases.length} fases · ${pct(p)}%</span></div>
    <div class="p-overview">${p.phases.map(ph=>`<div class="p-pip ${ph.status}" title="${ph.name}: ${PSL[ph.status]}"></div>`).join('')}
    <span class="p-prog-txt">${pct(p)}%</span></div>`;
  body.appendChild(pov);

  // — ⬡ Fases —
  const phs=document.createElement('div');
  phs.innerHTML='<div class="ps-h">⬡ Fases</div>';
  const phList=document.createElement('div');
  phList.style.cssText='display:flex;flex-direction:column;gap:10px;';

  p.phases.forEach(ph=>{
    const doneItems=ph.items.filter(x=>x.d).length;
    const addId=`add-${p.id}-${ph.id}`;
    const row=document.createElement('div');
    row.className=`phase-row ${ph.status}`;

    const itemsHtml=ph.items.map((item,i)=>`
      <div class="ph-item-row${item.d?' idone':''}">
        <div class="ph-chk${item.d?' ck':''}" onclick="toggleItem(${p.id},${ph.id},${i})">${item.d?'✓':''}</div>
        <span class="ph-item-txt" contenteditable="true" spellcheck="false"
          onblur="editItem(${p.id},${ph.id},${i},this.textContent)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
        >${item.t}</span>
        <button class="ph-item-del" onclick="deleteItem(${p.id},${ph.id},${i})">✕</button>
      </div>`).join('');

    row.innerHTML=`
      <div class="phase-row-top">
        <span class="ph-row-num">${ph.num}</span>
        <span class="ph-row-name">${ph.name}</span>
        <span class="ph-row-cnt">${doneItems}/${ph.items.length}</span>
        <button class="ph-row-adv" id="adv-${p.id}-${ph.id}">
          <div class="ph-row-adv-fill"></div>
          → avançar
        </button>
        <span class="ph-row-badge">${PSL[ph.status]}</span>
      </div>
      <div class="phase-items">${itemsHtml}</div>
      <div class="ph-add-row">
        <input class="ph-add-inp" type="text" id="${addId}" placeholder="＋ nova tarefa...">
        <button class="ph-add-btn" onclick="addItem(${p.id},${ph.id},'${addId}')">adicionar</button>
      </div>`;

    const advBtn=row.querySelector(`#adv-${p.id}-${ph.id}`);
    advBtn.addEventListener('mousedown',e=>startHoldBtn(e,advBtn,()=>cyclePhase(p.id,ph.id)));
    advBtn.addEventListener('mouseup',clearHold);
    advBtn.addEventListener('mouseleave',clearHold);
    advBtn.addEventListener('touchstart',e=>startHoldBtn(e,advBtn,()=>cyclePhase(p.id,ph.id)),{passive:false});
    advBtn.addEventListener('touchend',clearHold);

    const addInp=row.querySelector(`#${addId}`);
    if(addInp)addInp.addEventListener('keydown',e=>{if(e.key==='Enter')addItem(p.id,ph.id,addId);});

    phList.appendChild(row);
  });
  phs.appendChild(phList);body.appendChild(phs);

  // — ⚙️ Configurações —
  const es=document.createElement('div');
  es.innerHTML=`<div class="ps-h">⚙️ Configurações</div>
    <div class="eg">
      <div class="er"><span class="el">Nome</span><input type="text" value="${p.name}" oninput="uf(${id},'name',this.value)"></div>
      <div class="er"><span class="el">Emoji</span><input type="text" value="${p.emoji}" oninput="uf(${id},'emoji',this.value)" style="max-width:56px"></div>
      <div class="er"><span class="el">Descrição</span><input type="text" value="${p.desc}" oninput="uf(${id},'desc',this.value)"></div>
      <div class="er"><span class="el">Status</span>
        <select onchange="uf(${id},'status',this.value)">
          ${Object.entries(SM).map(([k,v])=>`<option value="${k}"${p.status===k?' selected':''}>${v.label}</option>`).join('')}
        </select>
      </div>
      <div class="er"><span class="el">Devs</span>
        <input type="range" min="0" max="10" value="${p.devs}" oninput="uf(${id},'devs',+this.value);document.getElementById('dvo-${id}').textContent=this.value">
        <span class="eo" id="dvo-${id}">${p.devs}</span>
      </div>
      <button class="db" onclick="rmP(${id})">🗑️ remover projeto</button>
    </div>`;
  body.appendChild(es);
}

// ── Actions ───────────────────────────────────────────
function uf(id,field,val){
  const p=ps.find(x=>x.id===id);p[field]=val;
  if(field==='name')document.getElementById('ph-name').textContent=val;
  if(field==='emoji')document.getElementById('ph-emoji').textContent=val;
  if(field==='desc')document.getElementById('ph-desc').textContent=val;
  if(field==='status'){const s=SM[val];const pb2=document.getElementById('ph-badge');pb2.className=s.b;pb2.textContent=s.label;}
  render();autoSave();
}
function rmP(id){
  if(!confirm('Remover este projeto?'))return;
  ps=ps.filter(x=>x.id!==id);closePanel();autoSave();
}
function addP(){
  const emojis=['🚀','💡','⚙️','🎯','🔧','📦','🌐','🧩'];
  const id=Date.now();
  ps.push({id,emoji:emojis[Math.floor(Math.random()*emojis.length)],
    name:'Novo projeto',desc:'Descrição do projeto',status:'plan',devs:1,start:'hoje',
    phases:[
      {id:1,num:'01',name:'Início',status:'active',items:[{t:'Definir escopo',d:false}]},
      {id:2,num:'02',name:'Fase 2',status:'planned',items:[{t:'A definir',d:false}]},
    ]});
  openPanel(id);render();autoSave();
}

// ── Tooltip ───────────────────────────────────────────
const ttEl=document.getElementById('tt');
function showTT(e,title,meta){
  ttEl.innerHTML=`<div class="tt-title">${title}</div>${meta?`<div class="tt-hint">${meta}</div>`:''}`;
  ttEl.style.display='block';
  ttEl.style.left=(e.clientX+14)+'px';ttEl.style.top=(e.clientY-8)+'px';
}
function hideTT(){ttEl.style.display='none';}

// ── Stars ─────────────────────────────────────────────
function stars(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  ctx.clearRect(0,0,c.width,c.height);
  for(let i=0;i<160;i++){
    ctx.beginPath();ctx.arc(Math.random()*c.width,Math.random()*c.height,Math.random()*1.1+.1,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*.3+.03})`;ctx.fill();
  }
}

// ── Persistência ──────────────────────────────────────
let saveTimer=null;
function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>doSave(),1200);
}
async function doSave(){
  try{
    await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({projects:ps})});
  }catch(e){console.error('Erro ao salvar',e);}
}
async function manualSave(){
  const btn=document.getElementById('save-btn');
  btn.className='tb-btn saving';btn.textContent='⏳ salvando...';
  await doSave();
  btn.className='tb-btn saved';btn.textContent='✓ salvo';
  setTimeout(()=>{btn.className='tb-btn save';btn.textContent='💾 salvar';},2500);
}
async function loadState(){
  try{
    const r=await fetch('/api/load');
    if(!r.ok)return;
    const data=await r.json();
    if(data&&data.projects&&data.projects.length){ps=data.projects;render();}
  }catch(e){console.log('Usando estado padrão');}
}

// ── Init ──────────────────────────────────────────────
const nd=new Date();
document.getElementById('today-date').textContent=nd.getDate()+' '+MN[nd.getMonth()]+' '+nd.getFullYear();
stars();loadState();render();
window.addEventListener('resize',()=>{stars();render();});
</script>
