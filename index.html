<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion v4.0</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2306080e'/><polygon points='16,3 27,9.5 27,22.5 16,29 5,22.5 5,9.5' fill='none' stroke='%231D9E75' stroke-width='1.5'/><polygon points='16,8 23,12 23,20 16,24 9,20 9,12' fill='%231D9E75' fill-opacity='0.15'/><circle cx='16' cy='16' r='2.5' fill='%231D9E75'/><circle cx='16' cy='16' r='1' fill='%232dd4a0'/></svg>">
<style>
html,body{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;background:#06080e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;user-select:none;}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);background-size:28px 28px;}
#vignette{position:fixed;top:50px;left:0;right:0;bottom:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 80% 70% at 50% 35%,transparent 25%,rgba(0,0,0,.72) 100%);}
#scanlines{position:fixed;inset:0;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px);}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(6,8,14,.97);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 28px;gap:20px;z-index:200;backdrop-filter:blur(12px);}
.tb-title{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.85);}
.tb-ver{font-size:10px;color:rgba(255,255,255,.2);margin-left:-12px;}
.tb-div{width:1px;height:16px;background:rgba(255,255,255,.07);}
.tb-stats{display:flex;gap:22px;}
.tb-stat{display:flex;align-items:baseline;gap:5px;font-size:11px;color:rgba(255,255,255,.3);}
.tb-num{font-size:14px;font-weight:600;color:rgba(255,255,255,.75);}
.tb-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.tb-btn{font-size:10px;background:none;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:5px 14px;cursor:pointer;color:rgba(255,255,255,.35);letter-spacing:.06em;text-transform:uppercase;transition:all .15s;}
.tb-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.65);}
.tb-btn.save{border-color:rgba(29,158,117,.3);color:rgba(29,158,117,.65);}
.tb-btn.save:hover{border-color:rgba(29,158,117,.6);color:#2dd4a0;}
.tb-btn.saving{border-color:rgba(239,159,39,.4);color:rgba(239,159,39,.7);pointer-events:none;}
.tb-btn.saved{border-color:rgba(29,158,117,.5);color:#2dd4a0;pointer-events:none;}
.tb-btn.reset{border-color:rgba(255,255,255,.06);color:rgba(255,255,255,.22);font-size:13px;padding:4px 10px;}
.tb-date{font-size:11px;color:rgba(255,255,255,.2);}

/* TREE */
#tree{position:fixed;top:50px;left:0;right:0;bottom:0;z-index:10;overflow:hidden;}
#canvas{position:absolute;top:0;left:0;width:2000px;height:1500px;transform-origin:0 0;will-change:transform;}
#tree-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#node-layer{position:absolute;top:0;left:0;width:100%;height:100%;}

/* BASE NODE */
.nd{position:absolute;transform:translate(-50%,-50%);}

/* ROOT */
.nd-root{width:50px;height:50px;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:17px;filter:drop-shadow(0 0 10px rgba(255,255,255,.15));transition:filter .2s;}
.nd-root:hover{filter:drop-shadow(0 0 20px rgba(255,255,255,.3));}

/* PROJECT OCTAGON */
.nd-proj{width:92px;height:92px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.nd-proj-outer{width:92px;height:92px;clip-path:polygon(22% 0%,78% 0%,100% 22%,100% 78%,78% 100%,22% 100%,0% 78%,0% 22%);display:flex;align-items:center;justify-content:center;transition:filter .2s;}
.nd-proj-inner{width:84px;height:84px;clip-path:polygon(22% 0%,78% 0%,100% 22%,100% 78%,78% 100%,22% 100%,0% 78%,0% 22%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.nd-proj:hover .nd-proj-outer{filter:brightness(1.28);}
.nd-proj.sel{transform:translate(-50%,-50%) scale(1.07);}
.nd-proj .pe{font-size:24px;line-height:1;}
.nd-proj .pp{font-size:9px;font-weight:700;letter-spacing:.1em;opacity:.9;}
.nd-proj .nd-lbl{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);pointer-events:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
.nd-proj .nd-sublbl{position:absolute;bottom:-36px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;color:rgba(249,115,22,.7);pointer-events:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em;}

/* PROJECT status colors */
.s-andamento .nd-proj-outer{background:#1D9E75;filter:drop-shadow(0 0 12px rgba(29,158,117,.5));}
.s-andamento .nd-proj-inner{background:radial-gradient(circle at 40% 35%,rgba(29,158,117,.22),rgba(6,8,14,.96));}
.s-atencao   .nd-proj-outer{background:#EF9F27;filter:drop-shadow(0 0 12px rgba(239,159,39,.5));}
.s-atencao   .nd-proj-inner{background:radial-gradient(circle at 40% 35%,rgba(239,159,39,.22),rgba(6,8,14,.96));}
.s-plan      .nd-proj-outer{background:#378ADD;filter:drop-shadow(0 0 12px rgba(55,138,221,.5));}
.s-plan      .nd-proj-inner{background:radial-gradient(circle at 40% 35%,rgba(55,138,221,.22),rgba(6,8,14,.96));}
.s-bloq      .nd-proj-outer{background:#E24B4A;filter:drop-shadow(0 0 12px rgba(226,75,74,.5));}
.s-bloq      .nd-proj-inner{background:radial-gradient(circle at 40% 35%,rgba(226,75,74,.22),rgba(6,8,14,.96));}
.s-paus      .nd-proj-outer{background:#555;filter:none;}
.s-paus      .nd-proj-inner{background:radial-gradient(circle at 40% 35%,rgba(100,100,100,.15),rgba(6,8,14,.96));}

/* PHASE DIAMOND — dark fill, colored border only */
.nd-phase{width:62px;height:62px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.nd-phase-outer{width:62px;height:62px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;align-items:center;justify-content:center;transition:filter .25s;}
.nd-phase-inner{width:56px;height:56px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:#080b12;}
.nd-phase:hover .nd-phase-outer{filter:brightness(1.35);}
.nd-phase .ph-n{font-size:9px;font-weight:700;letter-spacing:.08em;opacity:.6;line-height:1;}
.nd-phase .ph-ico{font-size:13px;line-height:1;}
.nd-phase .ph-tasks{font-size:8px;opacity:.42;line-height:1;margin-top:1px;}
.nd-phase .nd-lbl{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;letter-spacing:.08em;text-transform:uppercase;pointer-events:none;max-width:90px;overflow:hidden;text-overflow:ellipsis;text-align:center;}

/* Active phase — bigger */
.ph-active{width:70px;height:70px;}
.ph-active .nd-phase-outer{width:70px;height:70px;}
.ph-active .nd-phase-inner{width:64px;height:64px;}

/* Phase status: colored border (outer) + colored text (inner) */
.ph-done .nd-phase-outer{background:rgba(34,197,94,.65);filter:drop-shadow(0 0 5px rgba(34,197,94,.25));}
.ph-done .nd-phase-inner{color:rgba(34,197,94,.85);}
.ph-done .nd-lbl{color:rgba(34,197,94,.7);}

.ph-active .nd-phase-outer{background:rgba(249,115,22,.85);filter:drop-shadow(0 0 12px rgba(249,115,22,.5));}
.ph-active .nd-phase-inner{color:rgba(249,115,22,.95);}
.ph-active .nd-lbl{color:rgba(249,115,22,.9);}

.ph-planned .nd-phase-outer{background:rgba(59,130,246,.45);}
.ph-planned .nd-phase-inner{color:rgba(59,130,246,.7);}
.ph-planned .nd-lbl{color:rgba(59,130,246,.6);}
.ph-planned{opacity:.55;}

.ph-vision .nd-phase-outer{background:rgba(139,92,246,.35);}
.ph-vision .nd-phase-inner{color:rgba(139,92,246,.72);}
.ph-vision .nd-lbl{color:rgba(139,92,246,.55);}
.ph-vision{opacity:.32;}

/* PANEL */
#panel{position:fixed;top:50px;right:-440px;bottom:0;width:420px;background:rgba(6,8,14,.98);border-left:1px solid rgba(255,255,255,.06);transition:right .35s cubic-bezier(.4,0,.2,1);z-index:150;display:flex;flex-direction:column;backdrop-filter:blur(14px);}
#panel.open{right:0;}
#ph{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:10px;flex-shrink:0;}
#ph-back{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.28);font-size:20px;line-height:1;padding:0;}
#ph-back:hover{color:rgba(255,255,255,.8);}
#ph-emoji{font-size:22px;}
.ph-info{flex:1;min-width:0;}
#ph-name{font-size:14px;font-weight:600;color:rgba(255,255,255,.9);}
#ph-desc{font-size:11px;color:rgba(255,255,255,.32);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#ph-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;flex-shrink:0;}
#pb{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px;}
#pb::-webkit-scrollbar{width:3px;}
#pb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}
.ps-h{font-size:13px;font-weight:700;letter-spacing:.02em;color:rgba(255,255,255,.8);margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.07);}
.ps-c{margin-left:auto;font-size:11px;font-weight:400;color:rgba(255,255,255,.3);}
.p-overview{display:flex;gap:5px;align-items:center;}
.p-pip{flex:1;height:5px;border-radius:99px;}
.p-pip.done{background:#22C55E;}.p-pip.active{background:#F97316;}.p-pip.planned{background:rgba(59,130,246,.4);}.p-pip.vision{background:rgba(139,92,246,.25);}
.p-prog-txt{font-size:11px;color:rgba(255,255,255,.28);white-space:nowrap;margin-left:4px;}
.phase-row{border-radius:10px;border:1px solid;padding:12px 14px;transition:border-color .15s;}
.phase-row.done{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04);}
.phase-row.active{border-color:rgba(249,115,22,.35);background:rgba(249,115,22,.06);}
.phase-row.planned{border-color:rgba(59,130,246,.12);background:rgba(59,130,246,.02);opacity:.75;}
.phase-row.vision{border-color:rgba(139,92,246,.1);background:rgba(139,92,246,.02);opacity:.5;}
.phase-row-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ph-row-num{font-size:10px;font-weight:700;opacity:.45;min-width:20px;}
.ph-row-name{font-size:13px;font-weight:600;flex:1;}
.ph-row-cnt{font-size:10px;color:rgba(255,255,255,.22);}
.ph-row-adv{position:relative;overflow:hidden;font-size:10px;background:none;border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 10px;cursor:pointer;color:rgba(255,255,255,.45);transition:color .15s,border-color .15s;flex-shrink:0;}
.ph-row-adv:hover{border-color:rgba(255,255,255,.28);color:rgba(255,255,255,.8);}
.ph-row-adv-fill{position:absolute;top:0;left:0;height:100%;width:0%;background:rgba(255,255,255,.15);pointer-events:none;border-radius:4px;}
.ph-row-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.04em;flex-shrink:0;}
.done .ph-row-badge{background:rgba(34,197,94,.15);color:#4ade80;}
.active .ph-row-badge{background:rgba(249,115,22,.15);color:#fb923c;}
.planned .ph-row-badge{background:rgba(59,130,246,.12);color:#60a5fa;}
.vision .ph-row-badge{background:rgba(139,92,246,.12);color:#a78bfa;}
.phase-items{display:flex;flex-direction:column;gap:5px;}
.ph-item-row{display:flex;align-items:flex-start;gap:8px;padding:4px 2px;border-radius:5px;}
.ph-item-row:hover{background:rgba(255,255,255,.04);}
.ph-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid rgba(255,255,255,.18);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;margin-top:2px;transition:all .15s;}
.ph-chk.ck{background:#1D9E75;border-color:#1D9E75;}
.ph-item-txt{flex:1;font-size:11px;color:rgba(255,255,255,.55);line-height:1.5;outline:none;border-radius:3px;padding:0 2px;}
.ph-item-txt:focus{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9);}
.ph-item-row.idone .ph-item-txt{text-decoration:line-through;color:rgba(255,255,255,.22);}
.ph-item-del{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.15);font-size:12px;padding:0;opacity:0;flex-shrink:0;line-height:1;margin-top:3px;}
.ph-item-row:hover .ph-item-del{opacity:1;}
.ph-add-row{display:flex;gap:6px;margin-top:8px;}
.ph-add-inp{flex:1;font-size:11px;padding:5px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:6px;color:rgba(255,255,255,.7);outline:none;}
.ph-add-inp:focus{border-color:rgba(255,255,255,.18);}
.ph-add-btn{font-size:10px;background:none;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:0 9px;cursor:pointer;color:rgba(255,255,255,.3);white-space:nowrap;height:28px;}
.ph-add-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.65);}
.eg{display:flex;flex-direction:column;gap:7px;}
.er{display:flex;align-items:center;gap:9px;}
.el{font-size:11px;color:rgba(255,255,255,.25);min-width:58px;flex-shrink:0;}
.er input[type=text],.er select{flex:1;font-size:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:6px 9px;color:rgba(255,255,255,.75);outline:none;}
.er input[type=text]:focus,.er select:focus{border-color:rgba(255,255,255,.18);}
.er input[type=range]{flex:1;}
.eo{font-size:11px;color:rgba(255,255,255,.28);min-width:22px;}
.db{font-size:11px;background:none;border:1px solid rgba(226,75,74,.28);color:rgba(226,75,74,.6);border-radius:6px;padding:5px 10px;cursor:pointer;margin-top:3px;align-self:flex-start;}
.db:hover{color:#E24B4A;border-color:rgba(226,75,74,.55);}
.bg-g{background:rgba(29,158,117,.15);color:#2dd4a0;}
.bg-a{background:rgba(239,159,39,.15);color:#f5b942;}
.bg-b{background:rgba(55,138,221,.15);color:#60a8f0;}
.bg-r{background:rgba(226,75,74,.15);color:#f07070;}
.bg-z{background:rgba(136,136,136,.15);color:#aaa;}

/* TOOLTIP */
#tt{position:fixed;background:rgba(6,8,14,.97);border:1px solid rgba(255,255,255,.09);border-radius:7px;padding:10px 14px;font-size:11px;color:rgba(255,255,255,.6);pointer-events:none;z-index:400;display:none;max-width:320px;line-height:1.5;}
#tt .tt-title{font-weight:600;color:rgba(255,255,255,.85);margin-bottom:6px;font-size:12px;display:flex;align-items:center;}
#tt .tt-hint{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;border-top:1px solid rgba(255,255,255,.07);padding-top:6px;}

/* HINT */
#hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.16);letter-spacing:.08em;pointer-events:none;z-index:50;white-space:nowrap;}

/* MOBILE TOAST (tap feedback) */
#mob-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(6,8,14,.95);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 16px;font-size:11px;color:rgba(255,255,255,.7);pointer-events:none;z-index:500;display:none;max-width:88vw;line-height:1.5;backdrop-filter:blur(10px);}
#mob-toast .mt-title{font-weight:700;color:rgba(255,255,255,.9);margin-bottom:5px;font-size:12px;display:flex;align-items:center;gap:6px;}

/* MOBILE */
@media (max-width:768px){
  #topbar{padding:0 14px;gap:10px;}
  .tb-stats{gap:12px;}
  .tb-stat{font-size:10px;}
  .tb-num{font-size:12px;}
  .tb-date,.tb-ver{display:none;}
  .tb-btn{padding:4px 10px;font-size:9px;}

  #panel{top:auto;bottom:-100%;right:0;left:0;width:100%;height:75vh;
    border-left:none;border-top:1px solid rgba(255,255,255,.08);
    border-radius:16px 16px 0 0;
    transition:bottom .35s cubic-bezier(.4,0,.2,1);}
  #panel.open{bottom:0;}
  #panel-handle{display:block;}
  #ph{padding:14px 18px 12px;}
  #pb{padding:14px 18px;padding-bottom:32px;}
  .phase-row{padding:10px 12px;}

  #hint{font-size:9px;letter-spacing:.04em;white-space:normal;text-align:center;width:90vw;}
  #tt{display:none!important;}
}
@media (min-width:769px){
  #panel-handle{display:none;}
  #mob-toast{display:none!important;}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="grid"></div>
<div id="vignette"></div>
<div id="scanlines"></div>

<div id="topbar">
  <span class="tb-title">🌌 Orion</span>
  <span class="tb-ver">v4.0</span>
  <div class="tb-div"></div>
  <div class="tb-stats">
    <div class="tb-stat"><span class="tb-num" id="s-total">0</span>projetos</div>
    <div class="tb-stat"><span class="tb-num" id="s-phases">0</span>fases concluídas</div>
    <div class="tb-stat"><span class="tb-num" id="s-active">0</span>em andamento</div>
  </div>
  <div class="tb-actions">
    <button class="tb-btn reset" onclick="resetView()" title="Resetar visualização (R)">⌖</button>
    <button class="tb-btn save" id="save-btn" onclick="manualSave()">💾 salvar</button>
    <button class="tb-btn" onclick="addP()">＋ projeto</button>
    <span class="tb-date" id="today-date"></span>
  </div>
</div>

<div id="tree">
  <div id="canvas">
    <svg id="tree-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="node-layer"></div>
  </div>
</div>

<div id="panel">
  <div id="panel-handle" style="width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:99px;margin:10px auto 0;flex-shrink:0;"></div>
  <div id="ph">
    <button id="ph-back" onclick="closePanel()">←</button>
    <span id="ph-emoji"></span>
    <div class="ph-info"><div id="ph-name"></div><div id="ph-desc"></div></div>
    <span id="ph-badge"></span>
  </div>
  <div id="pb"></div>
</div>

<div id="tt"></div>
<div id="mob-toast"></div>
<div id="hint" id="hint-bar">ESPAÇO + ARRASTAR para mover &nbsp;·&nbsp; SCROLL para zoom &nbsp;·&nbsp; CLIQUE DIREITO nos diamantes para avançar · ESQUERDO para recuar</div>

<script>
// ── Cursors ───────────────────────────────────────────
;(function(){
  const e=s=>'data:image/svg+xml,'+encodeURIComponent(s);
  const crosshair=e(`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="1.5" fill="white" opacity=".5"/><path d="M11 2v6M11 14v6M2 11h6M14 11h6" stroke="white" stroke-opacity=".3" stroke-width="1"/></svg>`);
  const target=e(`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><circle cx="14" cy="14" r="2" fill="#1D9E75" opacity=".9"/><path d="M14 2v9M14 19v7M2 14h9M19 14h7" stroke="#1D9E75" stroke-opacity=".55" stroke-width="1"/><path d="M3 3h5M3 3v5M25 3h-5M25 3v5M3 25h5M3 25v-5M25 25h-5M25 25v-5" stroke="#1D9E75" stroke-opacity=".3" stroke-width="1"/></svg>`);

// ── Pan & Zoom ────────────────────────────────────────
let vx=0,vy=30,vs=1,panning=false,spaceDown=false,panMoved=false,lmx=0,lmy=0;
const canvasEl=document.getElementById('canvas');
const treeEl=document.getElementById('tree');

function applyT(){canvasEl.style.transform=`translate(${vx}px,${vy}px) scale(${vs})`;}
function resetView(){vx=window.innerWidth/2-CX;vy=window.innerHeight-1010;vs=1;applyT();}

document.addEventListener('keydown',e=>{
  if(e.code==='KeyR'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)&&!document.activeElement.isContentEditable){resetView();return;}
  if(e.code==='Space'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)&&!document.activeElement.isContentEditable){
    e.preventDefault();spaceDown=true;document.body.classList.add('space-held');
  }
});
document.addEventListener('keyup',e=>{
  if(e.code==='Space'){spaceDown=false;document.body.classList.remove('space-held','panning');panning=false;}
});
treeEl.addEventListener('mousedown',e=>{
  panMoved=false;
  if(spaceDown){panning=true;lmx=e.clientX;lmy=e.clientY;document.body.classList.remove('space-held');document.body.classList.add('panning');e.preventDefault();}
});
document.addEventListener('mousemove',e=>{
  if(panning){panMoved=true;vx+=e.clientX-lmx;vy+=e.clientY-lmy;lmx=e.clientX;lmy=e.clientY;applyT();}
  if(ttEl.style.display==='block'){ttEl.style.left=(e.clientX+14)+'px';ttEl.style.top=(e.clientY-8)+'px';}
});
document.addEventListener('mouseup',()=>{
  if(panning){panning=false;document.body.classList.remove('panning');if(spaceDown)document.body.classList.add('space-held');}
});
treeEl.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.92:1.08,ns=Math.max(0.15,Math.min(3,vs*f));
  const r=treeEl.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  vx=mx*(1-f)+vx*f;vy=my*(1-f)+vy*f;vs=ns;applyT();
},{passive:false});

// ── Touch pan + pinch zoom ────────────────────────────
let pinchDist0=null,touchPanning=false,touchStartX=0,touchStartY=0,touchStartTime=0;

treeEl.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    touchPanning=true;panMoved=false;
    lmx=e.touches[0].clientX;lmy=e.touches[0].clientY;
    touchStartX=lmx;touchStartY=lmy;touchStartTime=Date.now();
  } else if(e.touches.length===2){
    touchPanning=false;
    pinchDist0=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});

treeEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&touchPanning){
    const dx=e.touches[0].clientX-lmx,dy=e.touches[0].clientY-lmy;
    if(Math.abs(dx)>4||Math.abs(dy)>4)panMoved=true;
    vx+=dx;vy+=dy;lmx=e.touches[0].clientX;lmy=e.touches[0].clientY;applyT();
  } else if(e.touches.length===2&&pinchDist0!=null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=d/pinchDist0,ns=Math.max(0.15,Math.min(3,vs*f));
    const r=treeEl.getBoundingClientRect();
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    vx=mx*(1-f)+vx*f;vy=my*(1-f)+vy*f;vs=ns;pinchDist0=d;applyT();
  }
},{passive:false});

treeEl.addEventListener('touchend',()=>{touchPanning=false;pinchDist0=null;},{passive:true});

// ── Hold — glow on outer shape ────────────────────────
const HOLD_MS=2000;
let holdState=null;

function startHoldNode(e,el,dir,cb){
  e.stopPropagation();if(holdState)clearHold();
  const outer=el.querySelector('.nd-phase-outer')||el.querySelector('.nd-proj-outer');
  if(!outer)return;
  const fwd=el.querySelector('.tr-fwd'),bwd=el.querySelector('.tr-bwd');
  const trace=dir===+1?fwd:bwd;
  if(fwd)fwd.style.display='none';
  if(bwd)bwd.style.display='none';
  if(trace)trace.style.display='block';
  const perimeter=trace?parseFloat(trace.getAttribute('stroke-dasharray'))||200:200;
  const phClass=[...el.classList].find(c=>c.startsWith('ph-'));
  const status=phClass?phClass.replace('ph-',''):'active';
  const color=PSC[status]||'#fff';
  let p=0;const step=100/(HOLD_MS/16);
  holdState={timer:null,outer,trace,fwd,bwd,perimeter};
  holdState.timer=setInterval(()=>{
    p=Math.min(p+step,100);
    if(trace)trace.setAttribute('stroke-dashoffset',(perimeter*(1-p/100)).toFixed(1));
    const g=4+p*.2;
    outer.style.filter=`drop-shadow(0 0 ${g}px ${color})`;
    if(p>=100){clearHold();cb();}
  },16);
}
function startHoldBtn(e,btn,cb){
  e.stopPropagation();e.preventDefault();if(holdState)clearHold();
  const fill=btn.querySelector('.ph-row-adv-fill');if(!fill)return;
  let p=0;const step=100/(HOLD_MS/16);
  holdState={timer:setInterval(()=>{p=Math.min(p+step,100);fill.style.width=p+'%';if(p>=100){fill.style.width='0%';clearHold();cb();}},16),outer:null,trace:null,fwd:null,bwd:null};
}
function clearHold(){
  if(!holdState)return;clearInterval(holdState.timer);
  try{if(holdState.trace){holdState.trace.setAttribute('stroke-dashoffset',holdState.perimeter);holdState.trace.style.display='none';}}catch(x){}
  try{if(holdState.fwd)holdState.fwd.style.display='none';}catch(x){}
  try{if(holdState.bwd)holdState.bwd.style.display='none';}catch(x){}
  try{if(holdState.outer)holdState.outer.style.filter='';}catch(x){}
  holdState=null;
  document.querySelectorAll('.ph-row-adv-fill').forEach(f=>f.style.width='0%');
}

// ── Layout ────────────────────────────────────────────
function layout(){
  const n=ps.length,totalW=(n-1)*PROJ_SP,sx=CX-totalW/2;
  const root={x:CX,y:ROOT_Y};
  const projs=ps.map((p,i)=>({id:p.id,x:sx+i*PROJ_SP,y:PROJ_Y,status:p.status,emoji:p.emoji,name:p.name,pct:pct(p)}));
  const phases=[];
  ps.forEach((p,pi)=>{
    const pr=projs[pi];
    p.phases.forEach((ph,phi)=>phases.push({key:`${p.id}-${ph.id}`,pid:p.id,phid:ph.id,x:pr.x,y:PHASE_Y0+phi*PHASE_DY,status:ph.status,name:ph.name,num:ph.num,items:ph.items}));
  });
  return{root,projs,phases};
}

// ── SVG ───────────────────────────────────────────────
function renderSVG({root,projs,phases}){
  const svg=document.getElementById('tree-svg');svg.innerHTML='';
  const SC={andamento:'#1D9E75',atencao:'#EF9F27',plan:'#378ADD',bloq:'#E24B4A',paus:'#555'};
  function seg(x1,y1,x2,y2,stroke,op,w,dash=''){
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y1} L${x2},${y2}`);p.setAttribute('fill','none');
    p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',w);p.setAttribute('stroke-opacity',op);
    if(dash)p.setAttribute('stroke-dasharray',dash);svg.appendChild(p);
  }
  function dot(x,y,r,fill,op=1){
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);
    c.setAttribute('fill',fill);c.setAttribute('fill-opacity',op);svg.appendChild(c);
  }
  seg(root.x,root.y-25,root.x,RAIL_Y,'rgba(255,255,255,.25)',1,1.5);
  dot(root.x,root.y-25,3,'rgba(255,255,255,.3)');
  if(projs.length>1)seg(projs[0].x,RAIL_Y,projs[projs.length-1].x,RAIL_Y,'rgba(255,255,255,.1)',1,1);
  projs.forEach(pr=>{
    const c=SC[ps.find(p=>p.id===pr.id).status]||'#fff';
    dot(pr.x,RAIL_Y,3.5,c,0.55);seg(pr.x,RAIL_Y,pr.x,pr.y+PROJ_R,c,0.38,1.5);
  });
  ps.forEach((p,pi)=>{
    const pr=projs[pi],phs=phases.filter(x=>x.pid===p.id),c=SC[p.status]||'#fff';
    if(phs.length>0)seg(pr.x,pr.y-PROJ_R,pr.x,phs[0].y+PHASE_R,c,0.3,1.5);
    phs.forEach((ph,i)=>{
      if(i===0)return;
      const prev=phs[i-1],pc=PSC[ph.status];
      const pr2=prev.status==='active'?PHASE_RA:PHASE_R,cr=ph.status==='active'?PHASE_RA:PHASE_R;
      const op=ph.status==='done'?.48:ph.status==='active'?.38:ph.status==='planned'?.15:.07;
      const w=ph.status==='done'?1.5:1.2;
      const dash=ph.status==='planned'?'4,3':ph.status==='vision'?'3,4':'';
      seg(prev.x,prev.y-pr2,ph.x,ph.y+cr,pc,op,w,dash);
      if(ph.status==='done'||ph.status==='active')dot(ph.x,ph.y+cr,2.5,pc,0.5);
    });
  });
}

// ── Nodes ─────────────────────────────────────────────
function renderNodes({root,projs,phases}){
  const layer=document.getElementById('node-layer');layer.innerHTML='';
  const re=document.createElement('div');
  re.className='nd';re.style.cssText=`left:${root.x}px;top:${root.y}px;`;
  re.innerHTML='<div class="nd-root">⬡</div>';layer.appendChild(re);

  projs.forEach(pr=>{
    const p=ps.find(x=>x.id===pr.id),s=SM[pr.status];
    const ap=p.phases.find(x=>x.status==='active');
    const el=document.createElement('div');
    el.className=`nd nd-proj ${s.sc}${activeId===pr.id?' sel':''}`;
    el.style.cssText=`left:${pr.x}px;top:${pr.y}px;`;
    el.innerHTML=`
      <div class="nd-proj-outer"><div class="nd-proj-inner">
        <span class="pe">${pr.emoji}</span>
        <span class="pp">${pr.pct}%</span>
      </div></div>
      <span class="nd-lbl">${pr.name}</span>
      ${ap?`<span class="nd-sublbl">◉ ${ap.name}</span>`:''}`;
    el.onclick=()=>{if(panMoved)return;openPanel(pr.id);};
    el.onmouseenter=e=>showTT(e,pr.name,`${donePhases(p)}/${p.phases.length} fases · ${s.label}`);
    el.onmouseleave=hideTT;
    layer.appendChild(el);
  });

  phases.forEach(ph=>{
    const el=document.createElement('div');
    el.className=`nd nd-phase ph-${ph.status}`;
    el.style.cssText=`left:${ph.x}px;top:${ph.y}px;`;
    const ico=ph.status==='done'?'✓':ph.status==='active'?'◉':ph.status==='planned'?'◌':'◈';
    const done=ph.items.filter(x=>x.d).length,tot=ph.items.length;
    const isAct=ph.status==='active',sz=isAct?70:62,hf=sz/2;
    const P=+(4*hf*Math.SQRT2).toFixed(1),sc=PSC[ph.status]||'#fff';
    el.innerHTML=`
      <svg class="nd-trace" xmlns="http://www.w3.org/2000/svg"
        width="${sz}" height="${sz}" overflow="visible"
        style="position:absolute;top:0;left:0;pointer-events:none;z-index:10;">
        <polygon class="tr-fwd"
          points="${hf},0 ${sz},${hf} ${hf},${sz} 0,${hf}"
          fill="none" stroke="${sc}" stroke-width="2.5"
          stroke-dasharray="${P}" stroke-dashoffset="${P}" stroke-linecap="round"
          style="display:none"/>
        <polygon class="tr-bwd"
          points="${hf},0 0,${hf} ${hf},${sz} ${sz},${hf}"
          fill="none" stroke="${sc}" stroke-width="2.5"
          stroke-dasharray="${P}" stroke-dashoffset="${P}" stroke-linecap="round"
          style="display:none"/>
      </svg>
      <div class="nd-phase-outer"><div class="nd-phase-inner">
        <span class="ph-n">${ph.num}</span>
        <span class="ph-ico">${ico}</span>
        <span class="ph-tasks">${done}/${tot}</span>
      </div></div>
      <span class="nd-lbl">${ph.name}</span>`;
    // Right click = advance, left click = retreat
    el.addEventListener('mousedown',e=>{
      if(spaceDown)return;
      e.preventDefault();
      if(e.button===2)startHoldNode(e,el,+1,()=>cyclePhase(ph.pid,ph.phid,+1));
      if(e.button===0)startHoldNode(e,el,-1,()=>cyclePhase(ph.pid,ph.phid,-1));
    });
    el.addEventListener('mouseup',clearHold);
    el.addEventListener('mouseleave',()=>{clearHold();hideTT();});
    el.addEventListener('contextmenu',e=>e.preventDefault());
    el.addEventListener('touchstart',e=>{
      if(panMoved)return;
      startHoldNode(e,el,+1,()=>cyclePhase(ph.pid,ph.phid,+1));
    },{passive:false});
    el.addEventListener('touchend',e=>{
      const dt=Date.now()-touchStartTime;
      clearHold();
      if(dt<300&&!panMoved){
        const tl=ph.items.map(it=>`<div style="display:flex;gap:6px;align-items:baseline;padding:2px 0"><span style="color:${it.d?'#22C55E':'rgba(255,255,255,.3)'};font-size:10px">${it.d?'✓':'○'}</span><span style="${it.d?'text-decoration:line-through;color:rgba(255,255,255,.25)':'color:rgba(255,255,255,.65)'};font-size:11px;line-height:1.5">${it.t}</span></div>`).join('');
        showToast(`<span style="color:${PSC[ph.status]}">${ph.num}</span> ${ph.name}`,tl||'Sem tarefas');
      }
    },{passive:true});
    const taskList=ph.items.map(it=>{
      const done2=it.d;
      return `<div style="display:flex;gap:6px;align-items:baseline;padding:2px 0"><span style="color:${done2?'#22C55E':'rgba(255,255,255,.22)'};flex-shrink:0;font-size:10px">${done2?'✓':'○'}</span><span style="${done2?'text-decoration:line-through;color:rgba(255,255,255,.22)':'color:rgba(255,255,255,.58)'};font-size:11px;line-height:1.4">${it.t}</span></div>`;
    }).join('');
    el.onmouseenter=e=>showTT(e,`${ph.num} · ${ph.name}`,taskList||'Sem tarefas',PSC[ph.status],PSL[ph.status]);
    layer.appendChild(el);
  });
}

function renderStats(){
  document.getElementById('s-total').textContent=ps.length;
  document.getElementById('s-phases').textContent=ps.reduce((a,p)=>a+donePhases(p),0);
  document.getElementById('s-active').textContent=ps.filter(p=>p.phases.some(x=>x.status==='active')).length;
}
function render(){const l=layout();renderSVG(l);renderNodes(l);renderStats();}

// ── Cycle (with direction) ────────────────────────────
function cyclePhase(pid,phid,dir=1){
  const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);
  const idx=CYCLE.indexOf(ph.status);
  ph.status=CYCLE[((idx+dir)%CYCLE.length+CYCLE.length)%CYCLE.length];
  render();if(activeId===pid)buildPanel(pid);autoSave();
}

// ── Items ─────────────────────────────────────────────
function toggleItem(pid,phid,idx){const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);ph.items[idx].d=!ph.items[idx].d;buildPanel(pid);render();autoSave();}
function editItem(pid,phid,idx,val){const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);const v=val.trim();if(!v){ph.items.splice(idx,1);}else{ph.items[idx].t=v;}buildPanel(pid);autoSave();}
function deleteItem(pid,phid,idx){const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);ph.items.splice(idx,1);buildPanel(pid);render();autoSave();}
function addItem(pid,phid,inputId){const inp=document.getElementById(inputId),val=inp.value.trim();if(!val)return;const p=ps.find(x=>x.id===pid),ph=p.phases.find(x=>x.id===phid);ph.items.push({t:val,d:false});inp.value='';buildPanel(pid);render();autoSave();}

// ── Panel ─────────────────────────────────────────────
function openPanel(id){activeId=id;render();buildPanel(id);document.getElementById('panel').classList.add('open');}
function closePanel(){activeId=null;render();document.getElementById('panel').classList.remove('open');}

function buildPanel(id){
  const p=ps.find(x=>x.id===id),s=SM[p.status];
  document.getElementById('ph-emoji').textContent=p.emoji;
  document.getElementById('ph-name').textContent=p.name;
  document.getElementById('ph-desc').textContent=p.desc;
  const pb2=document.getElementById('ph-badge');pb2.className=s.b;pb2.textContent=s.label;
  const body=document.getElementById('pb');body.innerHTML='';
  const pov=document.createElement('div');
  pov.innerHTML=`<div class="ps-h">📈 Evolução <span class="ps-c">${donePhases(p)}/${p.phases.length} fases · ${pct(p)}%</span></div>
    <div class="p-overview">${p.phases.map(ph=>`<div class="p-pip ${ph.status}" title="${ph.name}: ${PSL[ph.status]}"></div>`).join('')}
    <span class="p-prog-txt">${pct(p)}%</span></div>`;
  body.appendChild(pov);
  const phs=document.createElement('div');
  phs.innerHTML='<div class="ps-h">⬡ Fases</div>';
  const phList=document.createElement('div');
  phList.style.cssText='display:flex;flex-direction:column;gap:10px;';
  p.phases.forEach(ph=>{
    const doneItems=ph.items.filter(x=>x.d).length,addId=`add-${p.id}-${ph.id}`;
    const row=document.createElement('div');row.className=`phase-row ${ph.status}`;
    const itemsHtml=ph.items.map((item,i)=>`
      <div class="ph-item-row${item.d?' idone':''}">
        <div class="ph-chk${item.d?' ck':''}" onclick="toggleItem(${p.id},${ph.id},${i})">${item.d?'✓':''}</div>
        <span class="ph-item-txt" contenteditable="true" spellcheck="false"
          onblur="editItem(${p.id},${ph.id},${i},this.textContent)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
        >${item.t}</span>
        <button class="ph-item-del" onclick="deleteItem(${p.id},${ph.id},${i})">✕</button>
      </div>`).join('');
    row.innerHTML=`
      <div class="phase-row-top">
        <span class="ph-row-num">${ph.num}</span>
        <span class="ph-row-name">${ph.name}</span>
        <span class="ph-row-cnt">${doneItems}/${ph.items.length}</span>
        <button class="ph-row-adv" id="adv-${p.id}-${ph.id}">
          <div class="ph-row-adv-fill"></div>→ avançar
        </button>
        <span class="ph-row-badge">${PSL[ph.status]}</span>
      </div>
      <div class="phase-items">${itemsHtml}</div>
      <div class="ph-add-row">
        <input class="ph-add-inp" type="text" id="${addId}" placeholder="＋ nova tarefa...">
        <button class="ph-add-btn" onclick="addItem(${p.id},${ph.id},'${addId}')">adicionar</button>
      </div>`;
    const advBtn=row.querySelector(`#adv-${p.id}-${ph.id}`);
    advBtn.addEventListener('mousedown',e=>startHoldBtn(e,advBtn,()=>cyclePhase(p.id,ph.id,+1)));
    advBtn.addEventListener('mouseup',clearHold);advBtn.addEventListener('mouseleave',clearHold);
    advBtn.addEventListener('touchstart',e=>startHoldBtn(e,advBtn,()=>cyclePhase(p.id,ph.id,+1)),{passive:false});
    advBtn.addEventListener('touchend',clearHold);
    const addInp=row.querySelector(`#${addId}`);
    if(addInp)addInp.addEventListener('keydown',e=>{if(e.key==='Enter')addItem(p.id,ph.id,addId);});
    phList.appendChild(row);
  });
  phs.appendChild(phList);body.appendChild(phs);
  const es=document.createElement('div');
  es.innerHTML=`<div class="ps-h">⚙️ Configurações</div>
    <div class="eg">
      <div class="er"><span class="el">Nome</span><input type="text" value="${p.name}" oninput="uf(${id},'name',this.value)"></div>
      <div class="er"><span class="el">Emoji</span><input type="text" value="${p.emoji}" oninput="uf(${id},'emoji',this.value)" style="max-width:56px"></div>
      <div class="er"><span class="el">Descrição</span><input type="text" value="${p.desc}" oninput="uf(${id},'desc',this.value)"></div>
      <div class="er"><span class="el">Status</span>
        <select onchange="uf(${id},'status',this.value)">
          ${Object.entries(SM).map(([k,v])=>`<option value="${k}"${p.status===k?' selected':''}>${v.label}</option>`).join('')}
        </select></div>
      <div class="er"><span class="el">Devs</span>
        <input type="range" min="0" max="10" value="${p.devs}" oninput="uf(${id},'devs',+this.value);document.getElementById('dvo-${id}').textContent=this.value">
        <span class="eo" id="dvo-${id}">${p.devs}</span></div>
      <button class="db" onclick="rmP(${id})">🗑️ remover projeto</button>
    </div>`;
  body.appendChild(es);
}

function uf(id,field,val){
  const p=ps.find(x=>x.id===id);p[field]=val;
  if(field==='name')document.getElementById('ph-name').textContent=val;
  if(field==='emoji')document.getElementById('ph-emoji').textContent=val;
  if(field==='desc')document.getElementById('ph-desc').textContent=val;
  if(field==='status'){const s=SM[val];const pb2=document.getElementById('ph-badge');pb2.className=s.b;pb2.textContent=s.label;}
  render();autoSave();
}
function rmP(id){if(!confirm('Remover este projeto?'))return;ps=ps.filter(x=>x.id!==id);closePanel();autoSave();}
function addP(){
  const emojis=['🚀','💡','⚙️','🎯','🔧','📦','🌐','🧩'];
  const id=Date.now();
  ps.push({id,emoji:emojis[Math.floor(Math.random()*emojis.length)],name:'Novo projeto',desc:'Descrição do projeto',status:'plan',devs:1,start:'hoje',
    phases:[{id:1,num:'01',name:'Início',status:'active',items:[{t:'Definir escopo',d:false}]},{id:2,num:'02',name:'Fase 2',status:'planned',items:[{t:'A definir',d:false}]}]});
  openPanel(id);render();autoSave();
}

// ── Tooltip ───────────────────────────────────────────
const ttEl=document.getElementById('tt');
function showTT(e,title,meta,color,statusLabel){
  const badge=color&&statusLabel?`<span style="font-size:9px;font-weight:700;color:${color};margin-left:6px;opacity:.85">${statusLabel}</span>`:'';
  ttEl.innerHTML=`<div class="tt-title">${title}${badge}</div>${meta?`<div class="tt-hint">${meta}</div>`:''}`;
  ttEl.style.display='block';ttEl.style.left=(e.clientX+14)+'px';ttEl.style.top=(e.clientY-8)+'px';
}
function hideTT(){ttEl.style.display='none';}

// ── Stars ─────────────────────────────────────────────
function stars(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;ctx.clearRect(0,0,c.width,c.height);
  for(let i=0;i<200;i++){
    ctx.beginPath();ctx.arc(Math.random()*c.width,Math.random()*c.height,Math.random()*1.1+.1,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*.25+.03})`;ctx.fill();
  }
}

// ── Persistence ───────────────────────────────────────
let saveTimer=null;
function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>doSave(),1200);}
async function doSave(){try{await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({projects:ps})});}catch(e){console.error('Erro ao salvar',e);}}
async function manualSave(){
  const btn=document.getElementById('save-btn');
  btn.className='tb-btn saving';btn.textContent='⏳ salvando...';
  await doSave();
  btn.className='tb-btn saved';btn.textContent='✓ salvo';
  setTimeout(()=>{btn.className='tb-btn save';btn.textContent='💾 salvar';},2500);
}
async function loadState(){
  try{const r=await fetch('/api/load');if(!r.ok)return;const data=await r.json();
    if(data&&data.projects&&data.projects.length){ps=data.projects;render();}}
  catch(e){console.log('Usando estado padrão');}
}

// ── Init ──────────────────────────────────────────────
const nd2=new Date();
document.getElementById('today-date').textContent=nd2.getDate()+' '+MN[nd2.getMonth()]+' '+nd2.getFullYear();
stars();resetView();render();loadState();
window.addEventListener('resize',()=>{stars();});
</script>
</body>
